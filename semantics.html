<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semantic HTML Example</title>
</head>
<body>

  <header>
    <h1>My Website</h1>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home">
      <h2>Welcome</h2>
      <p>This is the home section of the website.</p>
    </section>

    <section id="about">
      <h2>About Us</h2>

      <article>
        <h3>Our Mission</h3>
        <p>We aim to create simple and accessible websites.</p>
      </article>

      <article>
        <h3>Our Team</h3>
        <p>We are students learning web development.</p>
      </article>
    </section>

    <aside>
      <h2>Related Links</h2>
      <ul>
        <li><a href="#">HTML Basics</a></li>
        <li><a href="#">CSS Basics</a></li>
      </ul>
    </aside>
  </main>

  <footer>
    <p>&copy; 2026 My Website</p>
  </footer>

</body>
</html>
